name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test --if-present
      - run: npm run lint --if-present
      - run: npm run build --if-present

  test-demos:
    name: Test Python Demos
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib scipy sympy pytest

      - name: Run all Python demos (smoke test)
        run: |
          cd code
          failed=0
          for f in *.py; do
            [ "$f" = "__init__.py" ] && continue
            echo "--- Running $f ---"
            if timeout 30 python "$f" > /dev/null 2>&1; then
              echo "PASS: $f"
            else
              echo "FAIL: $f (exit $?)"
              failed=$((failed + 1))
            fi
          done
          echo ""
          echo "=== Results: $failed failures ==="
          [ "$failed" -eq 0 ]

      - name: Run pytest
        run: pytest tests/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python code
        run: ruff check code/ --select E,F,W --ignore E501
